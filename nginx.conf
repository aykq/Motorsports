events {
  worker_connections 1024;
}

http {
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_status 429;

  # HTTP → HTTPS yönlendirme
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Motorsports Hub
  server {
    listen 443 ssl;
    server_name mshub.194-62-54-96.sslip.io;

    ssl_certificate /etc/letsencrypt/live/mshub.194-62-54-96.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mshub.194-62-54-96.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.openf1.org https://api.jolpi.ca https://api.open-meteo.com https://archive-api.open-meteo.com; frame-ancestors 'none';" always;

    location / {
      proxy_pass http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
      proxy_pass http://127.0.0.1:3000;
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
  }

  # Immich
  server {
    listen 443 ssl;
    server_name immich.194-62-54-96.sslip.io;

    ssl_certificate /etc/letsencrypt/live/immich.194-62-54-96.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/immich.194-62-54-96.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50G;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
      proxy_pass http://127.0.0.1:2283;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
